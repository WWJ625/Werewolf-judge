    <h2>⭐ 分配警徽</h2>
    <div style="padding:20px 0;">
      <div style="font-size:18px;margin-bottom:8px;">确认 <b style="color:var(--accent);">${n}号 ${roleName(p.role)}</b> 获得警徽吗？</div>
      <div style="color:var(--text-muted);font-size:13px;">分配后，直至该玩家被淘汰前不可更改</div>
    </div>
    <div style="display:flex;gap:12px;justify-content:center;">
      <button class="btn btn-primary" onclick="confirmBadgeAssign(${n})">✅ 确认分配</button>
      <button class="btn btn-dark" onclick="$('nightModal').classList.remove('show')">取消</button>
    </div>`;
  modal.classList.add('show');
}

function confirmBadgeAssign(n) {
  $('nightModal').classList.remove('show');
  state.badgeHolder = n;
  state.badgeLocked = true;
  state.badgeEverAssigned = true;
  addLog(`${n}号${roleName(getPlayer(n).role)}获得警徽`);
  renderGame();
}

function showTearUpBadgeConfirm() {
  const modal = $('nightModal');
  const content = $('nightModalContent');
  content.innerHTML = `
    <h2>⭐ 撕毁警徽</h2>
    <div style="padding:20px 0;">
      <div style="font-size:18px;margin-bottom:8px;">确认撕毁警徽吗？</div>
      <div style="color:var(--text-muted);font-size:13px;">撕毁后本局游戏不再使用警徽</div>
    </div>
    <div style="display:flex;gap:12px;justify-content:center;">
      <button class="btn btn-danger" onclick="confirmTearUpBadge()">确认撕毁</button>
      <button class="btn btn-dark" onclick="$('nightModal').classList.remove('show')">取消</button>
    </div>`;
  modal.classList.add('show');
}

function confirmTearUpBadge() {
  $('nightModal').classList.remove('show');
  state.badgeTornUp = true;
  state.badgeHolder = null;
  state.badgeLocked = false;
  const prev = getPlayer(state.badgeLastHolder);
  addLog(`${state.badgeLastHolder}号${prev ? roleName(prev.role) : ''}撕毁警徽`);
  renderGame();
}

function voteOut() {
  if (!daySelectedTarget) return;
  const n = daySelectedTarget;
  daySelectedTarget = null;
  const p = getPlayer(n);
  if (!p || !p.isAlive) { showMessage('该玩家已死亡'); return; }

  if (p.role === 'fool') {
    if (p.foolRevealed) { showMessage('愚者已翻牌，不能再次被投票放逐'); return; }
    p.foolRevealed = true;
    addLog(`${n}号${roleName(p.role)}被投票放逐，愚者翻牌亮明身份，存活但失去投票资格`);
    daySelectedTarget = null;
    renderGame();
    return;
  }

  p.isAlive = false;
  handleBadgeTransfer(p);
  addLog(`${n}号${roleName(p.role)}被投票放逐`);

  if (['hunter','wolfking'].includes(p.role)) {
    deathShootInfo = { number: n, role: p.role };
    deathShootEndsDay = true;
    dayMode = 'deathShoot';
    renderGame();
    return;
  }
  // No death shoot: advance to night immediately
  renderGame();
  if (!checkWinCondition()) {
    lockUI();
    setTimeout(() => { unlockUI(); startNextNight(); }, 500);
  }
}

function startNextNight() {
  if (dayMode === 'deathShoot' && deathShootInfo) {
    showMessage('请先完成或放弃死亡开枪技能，再进入夜晚');
    return;
  }
  if (dayMode === 'pickWolf') {
    showMessage('请先选择自爆的狼人或取消');
    return;
  }
  if (checkWinCondition()) return; // Game over — don't advance
  state.isDay = false;
  state.night++;
  dayMode = 'normal';
  daySelectedTarget = null;
  deathShootInfo = null;
  resetNightState();
  buildPhaseOrder();
  renderGame();
  addLog(`=== 进入第${state.night}夜 ===`);
  saveState();
}

// ===========================
// RESTORE
// ===========================
function restoreGame() {
  const saved = loadState();
  if (!saved) return false;
  if (!saved.players || saved.players.length === 0) return false;

  state.mode = saved.mode;
  state.badgeRule = saved.badgeRule;
  state.night = saved.night;
  state.isDay = saved.isDay;
  state.wolfBossType = saved.wolfBossType;
  state.guardianType = saved.guardianType;
  state.players = saved.players;
  state.players.forEach(p => { if (p.foolRevealed === undefined) p.foolRevealed = false; });
  state.badgeHolder = saved.badgeHolder;
  state.badgeLocked = saved.badgeLocked || false;
  state.badgeTornUp = saved.badgeTornUp || false;
  state.badgeEverAssigned = saved.badgeEverAssigned || false;
  state.badgeLastHolder = saved.badgeLastHolder || null;
  state.log = saved.log;
  state.phaseOrder = saved.phaseOrder;
  state.phaseIdx = saved.phaseIdx;
  state.wolfTarget = saved.wolfTarget;
  state.seerTarget = saved.seerTarget;
  state.seerResult = saved.seerTarget ? factionOf(getPlayer(saved.seerTarget)?.role) : null;
  state.guardTarget = saved.guardTarget;
  state.witchUsedAntidote = saved.witchUsedAntidote;
  state.witchPoisonTarget = saved.witchPoisonTarget;
  state.wolfEmptyKill = saved.wolfEmptyKill || false;
  state.uiLocked = false;

  dayMode = 'normal';
  daySelectedTarget = null;
  deathShootInfo = null;
  deathShootEndsDay = false;
  pendingNightDeathShoot = null;

  showScreen('game');
  renderGame();
  return true;
}

// ===========================
// THEME
// ===========================
function initTheme() {
  const saved = localStorage.getItem('werewolf-theme');
  if (saved === 'light') {
    document.body.classList.add('light');
    $('themeToggle').textContent = '🌙';
  }
}
function toggleTheme() {
  const isLight = document.body.classList.toggle('light');
  $('themeToggle').textContent = isLight ? '🌙' : '☀️';
  localStorage.setItem('werewolf-theme', isLight ? 'light' : 'dark');
}
initTheme();

// ===========================
// INIT
// ===========================
clearSave();
renderAssignment();
</script>
</body>
</html>
